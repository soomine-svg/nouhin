<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.P.canvas｜写真データ受付</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@500;600&display=swap');

  :root{
    --bg:#f7f4ee; --ink:#3a352e; --sub:#8a8276;
    --accent:#c08a4e; --accent-deep:#9a6a36;
    --card:#fffdf9; --line:#e6ddcf; --ok:#6b8f6b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(192,138,78,.08), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(107,143,107,.07), transparent 40%),
      var(--bg);
    color:var(--ink); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 18px 60px; line-height:1.7;
  }
  .brand{text-align:center; margin-top:14px; margin-bottom:6px;}
  .brand .logo{
    font-family:'Shippori Mincho',serif; font-size:1.9rem;
    letter-spacing:.08em; color:var(--accent-deep);
  }
  .brand .logo span{color:var(--accent-deep);}
  .tagline{
    font-family:'Shippori Mincho',serif; font-size:.92rem;
    color:var(--sub); margin-top:8px; letter-spacing:.04em;
  }
  .school{margin:22px 0 4px; font-size:1.15rem; font-weight:700; text-align:center;}
  .school small{
    display:block; font-size:.78rem; color:var(--sub);
    font-weight:400; letter-spacing:.05em; margin-bottom:2px;
  }
  .card{
    width:100%; max-width:560px; background:var(--card);
    border:1px solid var(--line); border-radius:22px;
    padding:26px 24px; margin-top:18px;
    box-shadow:0 18px 40px -28px rgba(120,90,40,.5);
  }
  .status{
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(180deg,#fbf6ec,#fdfbf6);
    border:1px solid var(--line); border-radius:16px;
    padding:16px 18px; margin-bottom:22px;
  }
  .status .dot{
    width:38px;height:38px;flex:0 0 38px; border-radius:50%;
    background:rgba(107,143,107,.14);
    display:flex;align-items:center;justify-content:center; font-size:1.1rem;
  }
  .status .txt b{font-size:1.02rem;color:var(--ink);}
  .status .txt p{font-size:.8rem;color:var(--sub);}
  .drop{
    border:2px dashed #d8cbb3; border-radius:18px; padding:40px 20px;
    text-align:center; cursor:pointer; transition:.25s; background:#fffefb;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  .drop:hover,.drop.drag{border-color:var(--accent); background:#fdf6ea; transform:translateY(-1px);}
  .drop .ico{font-size:2.6rem;}
  .drop .big{font-size:1.12rem;font-weight:700;}
  .drop .small{font-size:.82rem;color:var(--sub);}
  #fileInput{display:none;}
  .selected{margin-top:18px;display:none;}
  .selected.show{display:block;}
  .selected h4{font-size:.85rem;color:var(--sub);font-weight:500;margin-bottom:10px;}
  .thumb-row{display:flex;flex-wrap:wrap;gap:8px;}
  .thumb{
    width:62px;height:62px;border-radius:10px;overflow:hidden;
    border:1px solid var(--line);position:relative;background:#eee;
    display:flex;align-items:center;justify-content:center;
    font-size:.62rem;color:var(--sub);text-align:center;padding:2px;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .count{font-size:.85rem;color:var(--ink);margin-top:12px;font-weight:700;}
  .send{
    width:100%; margin-top:22px; padding:18px; border:none; border-radius:16px;
    background:linear-gradient(180deg,var(--accent),var(--accent-deep));
    color:#fff; font-family:'Zen Maru Gothic',sans-serif; font-size:1.12rem;
    font-weight:700; letter-spacing:.08em; cursor:pointer;
    box-shadow:0 12px 24px -12px rgba(154,106,54,.8); transition:.2s;
  }
  .send:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .progress{margin-top:16px;display:none;}
  .progress.show{display:block;}
  .bar{height:8px;background:#eee;border-radius:6px;overflow:hidden;}
  .bar i{display:block;height:100%;width:0;background:var(--accent);transition:.3s;}
  .progress p{font-size:.8rem;color:var(--sub);margin-top:6px;text-align:center;}
  .help{margin-top:18px;font-size:.78rem;color:var(--sub);text-align:center;line-height:1.9;}
  .footer{margin-top:34px;font-size:.72rem;color:#b3a991;letter-spacing:.06em;text-align:center;}

  /* 合言葉入力ゲート */
  .gate{
    width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);
    border-radius:22px;padding:30px 26px;margin-top:24px;text-align:center;
    box-shadow:0 18px 40px -28px rgba(120,90,40,.5);
  }
  .gate h3{font-family:'Shippori Mincho',serif;font-size:1.1rem;margin-bottom:6px;}
  .gate p{font-size:.82rem;color:var(--sub);margin-bottom:18px;}
  .gate input{
    width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    font-size:1.1rem;text-align:center;letter-spacing:.3em;font-family:inherit;
  }
  .gate button{
    width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;
    background:linear-gradient(180deg,var(--accent),var(--accent-deep));
    color:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
  }
  .gate .err{color:#b5564b;font-size:.8rem;margin-top:10px;min-height:1.2em;}

  .done{
    position:fixed;inset:0;background:rgba(247,244,238,.96);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;z-index:50;
  }
  .done.show{display:flex;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .done .mark{font-size:3.4rem;margin-bottom:16px;}
  .done h2{font-family:'Shippori Mincho',serif;font-size:1.4rem;margin-bottom:10px;}
  .done p{color:var(--sub);font-size:.92rem;}
  .done button{
    margin-top:26px;padding:12px 30px;border-radius:12px;border:1px solid var(--line);
    background:#fff;color:var(--ink);font-family:inherit;font-size:.9rem;cursor:pointer;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>

  <div class="brand">
    <div class="logo">H.P.<span>canvas</span></div>
    <div class="tagline">今しか見られない瞬間を、未来へつなぐ宝物に</div>
  </div>

  <!-- 合言葉ゲート -->
  <div class="gate" id="gate">
    <h3>写真データ受付ページ</h3>
    <p id="gateSchool">合言葉を入力してください</p>
    <input type="text" id="passInput" inputmode="numeric" placeholder="あいことば" autocomplete="off">
    <button id="gateBtn">ひらく</button>
    <div class="err" id="gateErr"></div>
  </div>

  <!-- メイン（認証後に表示） -->
  <div class="school hidden" id="mainHead">
    <small>写真データ受付ページ</small>
    <span id="schoolName">○○保育園</span> さま 専用
  </div>

  <div class="card hidden" id="mainCard">
    <div class="status">
      <div class="dot">🕊️</div>
      <div class="txt">
        <b id="statusDate">―</b> <span id="statusSuffix"></span>
        <p>最新の撮影日をもとに自動表示しています</p>
      </div>
    </div>

    <label class="drop" id="drop" for="fileInput">
      <div class="ico">📷</div>
      <div class="big">ここに写真を入れてください</div>
      <div class="small">タップして選ぶ／ドラッグでもOK（JPG・HEIC対応）</div>
    </label>
    <input type="file" id="fileInput" multiple accept="image/*,.heic,.heif">

    <div class="selected" id="selected">
      <h4>選ばれた写真</h4>
      <div class="thumb-row" id="thumbs"></div>
      <div class="count" id="count"></div>
    </div>

    <div class="progress" id="progress">
      <div class="bar"><i id="barFill"></i></div>
      <p id="progressTxt">送っています…</p>
    </div>

    <button class="send" id="send" disabled>この写真を送る</button>

    <div class="help">
      迷ったときは、入れたい写真をぜんぶ選んで「送る」を押すだけで大丈夫です。<br>
      送信後はこのページを閉じていただいてかまいません。
    </div>
  </div>

  <div class="footer">H.P.canvas株式会社　記憶の片隅に、そっと灯る写真を。</div>

  <div class="done" id="done">
    <div class="mark">✨</div>
    <h2>ありがとうございました</h2>
    <p id="doneMsg">写真をたしかに受け取りました。<br>大切にお預かりいたします。</p>
    <button onclick="location.reload()">とじる</button>
  </div>

<!-- EXIF撮影日を読むためのライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
<script>
  // ============================================================
  //  設定：GASのウェブアプリURL
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrBqR037fGAdDMa4p-FJCixHDOKjMZvFRuZlvQMb7DLXusc5WtOulVAGOpJB34mfngUA/exec';

  // 園コードはURLのパラメータから取得（例: ?school=sakura）
  const params = new URLSearchParams(location.search);
  const SCHOOL_CODE = params.get('school') || '';

  let PASS = '';
  let files = [];               // 今回選ばれたファイル（再送時もそのまま使い回す）
  let latestShootYM = null;     // 最新撮影年月 "2026-05"
  let uploadedSet = {};         // 受取済みの内容ハッシュ(先頭6桁) { hash6: true }
  let fileHashes = new Map();   // File -> hash6 のキャッシュ

  const $ = id => document.getElementById(id);

  // ---------- 合言葉ゲート ----------
  $('gateBtn').addEventListener('click', openGate);
  $('passInput').addEventListener('keydown', e => { if(e.key==='Enter') openGate(); });

  async function openGate(){
    const pass = $('passInput').value.trim();
    if(!pass){ $('gateErr').textContent='合言葉を入れてください'; return; }
    $('gateErr').textContent='確認しています…';
    try{
      const res = await fetch(`${GAS_URL}?action=status&school=${encodeURIComponent(SCHOOL_CODE)}&pass=${encodeURIComponent(pass)}&t=${Date.now()}`);
      const d = await res.json();
      if(!d.ok){ $('gateErr').textContent = d.error || '合言葉が違うようです'; return; }
      PASS = pass;
      uploadedSet = {};
      (d.uploadedHashes || []).forEach(h => uploadedSet[String(h).toLowerCase()] = true);
      $('schoolName').textContent = d.schoolName;
      if(d.lastDate){
        $('statusDate').textContent = d.lastDate + '分';
        $('statusSuffix').textContent = 'まで受け取り済みです';
      }else{
        $('statusDate').textContent = 'まだ受け取りはありません';
        $('statusSuffix').textContent = '';
      }
      $('gate').classList.add('hidden');
      $('mainHead').classList.remove('hidden');
      $('mainCard').classList.remove('hidden');
    }catch(err){
      $('gateErr').textContent = '通信に失敗しました。電波のよい場所でお試しください。';
    }
  }

  // ---------- ファイル選択 ----------
  const fileInput=$('fileInput'), drop=$('drop'), selected=$('selected'),
        thumbs=$('thumbs'), count=$('count'), send=$('send');

  fileInput.addEventListener('change',e=>handle(e.target.files));
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
  drop.addEventListener('drop',e=>handle(e.dataTransfer.files));

  async function handle(list){
    files=Array.from(list);
    if(!files.length)return;
    send.textContent='この写真を送る';
    thumbs.innerHTML='';

    for(const f of files.slice(0,12)){
      const t=document.createElement('div');t.className='thumb';
      if(f.type.startsWith('image/')&&!/heic|heif/i.test(f.name)){
        const img=document.createElement('img');img.src=URL.createObjectURL(f);t.appendChild(img);
      }else{
        t.textContent=(f.name.split('.').pop()||'IMG').toUpperCase();
      }
      thumbs.appendChild(t);
    }
    if(files.length>12){
      const more=document.createElement('div');more.className='thumb';
      more.textContent='+'+(files.length-12);thumbs.appendChild(more);
    }

    // EXIF撮影日を読む（JPG中心。読めたものの最新を採用。HEIC等は更新日にフォールバック）
    let latest=null;
    for(const f of files){
      let dt=null;
      try{
        const ex=await exifr.parse(f,['DateTimeOriginal']);
        if(ex&&ex.DateTimeOriginal) dt=new Date(ex.DateTimeOriginal);
      }catch(e){}
      if(!dt) dt=new Date(f.lastModified);
      if(!latest||dt>latest) latest=dt;
    }
    if(latest){
      const y=latest.getFullYear(), m=String(latest.getMonth()+1).padStart(2,'0');
      latestShootYM=`${y}-${m}`;
    }

    // 受取済み判定（内容ハッシュで照合）
    let doneCount = 0;
    for(const f of files){ if(uploadedSet[await hash6(f)]) doneCount++; }
    const pendingCount = files.length - doneCount;
    count.textContent = doneCount>0
      ? `${files.length} 枚を選びました（うち ${doneCount}枚 は受け取り済み・残り ${pendingCount}枚）`
      : `${files.length} 枚を選びました`;
    selected.classList.add('show');
    send.disabled=false;
  }

  // ---------- 送信（直接Driveアップロード） ----------
  send.addEventListener('click', upload);

  async function upload(){
    if(!files.length) return;

    // 未送信ファイルだけを対象にする（成功済みは uploadedSet に入るので再送時に自動で除外）
    const pending = [];
    for(const f of files){
      const h = await hash6(f);
      if(!uploadedSet[h]) pending.push(f);
    }
    const already = files.length - pending.length;

    if(pending.length === 0){
      $('done').classList.add('show');
      return;
    }

    send.disabled=true;
    $('progress').classList.add('show');
    const barFill=$('barFill'), progressTxt=$('progressTxt');

    // ① 受付準備：合言葉でGASから「保存先フォルダ」と「一時鍵」をもらう
    progressTxt.textContent='受付の準備をしています…';
    let token, folderId;
    try{
      const prep = await prepare(latestShootYM);
      token = prep.token; folderId = prep.folderId;
    }catch(err){
      progressTxt.textContent='準備に失敗しました（'+err.message+'）。電波のよい場所でもう一度お試しください。';
      send.disabled=false; return;
    }

    // ② 写真をそのまま（バイナリ）Driveへ直接アップロード。
    //    複数を同時並行（CONCURRENCY）で送り、1枚ごとにDriveから保存成功の返事をもらう。
    const CONCURRENCY = 4;
    let done = 0;
    const failed = [];
    let idx = 0;

    const getToken = () => token;
    const setToken = t => { token = t; };

    async function worker(){
      while(idx < pending.length){
        const f = pending[idx++];
        const ok = await uploadOne(f, folderId, getToken, setToken);
        if(ok){
          uploadedSet[await hash6(f)] = true;   // ✓ Drive本体が保存を確認した分だけ
          done++;
        }else{
          failed.push(f);
        }
        const total = already + done;
        barFill.style.width = Math.round(total/files.length*100)+'%';
        progressTxt.textContent = `送っています… ${total}/${files.length}枚`;
      }
    }

    await Promise.all(Array.from({length:CONCURRENCY}, ()=>worker()));

    // ③ 全数照合：失敗が1枚も無ければ完了。あれば残りを再送できるようにする。
    if(failed.length === 0){
      $('done').classList.add('show');
    }else{
      const total = already + done;
      progressTxt.textContent =
        `${total}/${files.length}枚 たしかに届きました。残り ${failed.length}枚 が未達です。`+
        `「続きを送る」を押すと、未達の分だけ送り直します。`;
      send.disabled=false;
      send.textContent='続きを送る';
    }
  }

  /** GASから保存先フォルダIDと一時鍵を取得 */
  async function prepare(ym){
    const res = await fetch(
      `${GAS_URL}?action=prepare&school=${encodeURIComponent(SCHOOL_CODE)}`+
      `&pass=${encodeURIComponent(PASS)}&ym=${encodeURIComponent(ym||'')}&t=${Date.now()}`
    );
    const d = await res.json();
    if(!d || !d.ok || !d.token || !d.folderId){
      throw new Error((d && d.error) || 'no token/folder');
    }
    return d;
  }

  /**
   * 1枚をDriveへアップロード。成功=trueを返す。
   * ・最大3回まで再試行
   * ・鍵切れ(401)のときは prepare で鍵を取り直して続行
   */
  async function uploadOne(file, folderId, getToken, setToken){
    const h = await hash6(file);
    const saveName = makeSaveName(file.name, h);
    let triedRefresh = false;

    for(let attempt=0; attempt<3; attempt++){
      try{
        const res = await driveUpload(file, saveName, folderId, getToken());
        if(res.ok) return true;                      // 201/200 = 保存成功
        if(res.status === 401 && !triedRefresh){     // 鍵切れ → 取り直し
          triedRefresh = true;
          const fresh = await prepare(latestShootYM);
          setToken(fresh.token);
          continue;
        }
        // それ以外のエラーは少し待って再試行
      }catch(e){ /* 通信エラー：再試行 */ }
      await sleep(800*(attempt+1));
    }
    return false;
  }

  /**
   * Drive REST API へ multipart で直接アップロード（base64を使わず、写真の実体をそのまま送る）。
   * メタ情報(ファイル名・保存先フォルダ)と画像本体を1リクエストで送る。
   */
  function driveUpload(file, name, folderId, token){
    const boundary = '----hpcanvas' + Math.random().toString(16).slice(2);
    const meta = { name: name, parents: [folderId] };
    const body = new Blob([
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`,
      JSON.stringify(meta),
      `\r\n--${boundary}\r\nContent-Type: ${file.type || 'application/octet-stream'}\r\n\r\n`,
      file,                                  // ← 画像の実体（バイナリ）をそのまま
      `\r\n--${boundary}--`
    ]);
    return fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      {
        method:'POST',
        headers:{
          'Authorization':'Bearer '+token,
          'Content-Type':'multipart/related; boundary='+boundary
        },
        body: body
      }
    );
  }

  /** 保存名：元名_ハッシュ6桁.拡張子（衝突回避＆受取済み判定の目印） */
  function makeSaveName(name, h){
    const short = (h||'').substring(0,6);
    const dot = name.lastIndexOf('.');
    const base = dot>0 ? name.substring(0,dot) : name;
    const ext  = dot>0 ? name.substring(dot) : '';
    return `${base}_${short}${ext}`;
  }

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  /** ファイル内容からSHA-256の先頭6桁（受取済み判定・保存名に使用） */
  async function hash6(file){
    if(fileHashes.has(file)) return fileHashes.get(file);
    const buf = await file.arrayBuffer();
    const digest = await crypto.subtle.digest('SHA-256', buf);
    const hex = Array.from(new Uint8Array(digest))
      .map(b=>b.toString(16).padStart(2,'0')).join('');
    const h = hex.substring(0,6);
    fileHashes.set(file, h);
    return h;
  }
</script>
</body>
</html>
